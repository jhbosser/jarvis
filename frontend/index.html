<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jarvis Prompt</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="chat-shell">
      <header class="chat-header">
        <div>
          <p class="eyebrow">Jarvis Prompt</p>
          <h1>Converse com um prompt so.</h1>
        </div>
        <p class="status-pill" id="connection-status">Conectando...</p>
      </header>

      <section class="chat-history" id="chat-history" aria-live="polite"></section>

      <section class="composer-shell">
        <label for="prompt-input">Prompt</label>
        <textarea
          id="prompt-input"
          rows="3"
          placeholder="Digite e aperte Enter. Ex.: search: victor"
        ></textarea>
        <p class="hint-line">
          Enter envia. Shift+Enter quebra linha. Comandos: <code>help</code>,
          <code>today</code>, <code>context</code>,
          <code>search: termo</code>, <code>remind: titulo | data</code>,
          <code>done: id</code>, <code>/api https://seu-backend</code>.
        </p>
      </section>
    </main>

    <script src="./app.js" defer></script>
  </body>
</html>
